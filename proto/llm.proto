// proto/llm.proto
// Contrat du service jarvis-llm : 100% local via Ollama.

syntax = "proto3";
package jarvis.llm.v1;

import "common.proto";

service LlmService {
    rpc Ping (PingRequest) returns (PingResponse);

    // Complete : appel non-streaming. Le service appelle Ollama avec le modele
    // configure (defaut gpt-oss:120b, override via $JARVIS_LLM_MODEL).
    rpc Complete (CompleteRequest) returns (CompleteResponse);

    // TODO sprint suivant : rpc Stream (CompleteRequest) returns (stream CompletionChunk);
}

message PingRequest { string client_id = 1; }
message PingResponse { jarvis.common.v1.Status status = 1; string version = 2; }

// Classification grossiere de l'intent utilisateur. Sert pour l'observability
// (logging) et potentiellement un futur routing multi-modeles. Doit rester
// aligne avec l'enum jarvis_llm.router.IntentClass cote Python.
enum IntentClass {
    INTENT_UNSPECIFIED = 0;
    INTENT_SIMPLE = 1;          // FAQ, status, conversion
    INTENT_CONVERSATIONAL = 2;  // small talk
    INTENT_COMPLEX = 3;         // reasoning, analyse
    INTENT_CODE = 4;            // generation/explication code
    INTENT_TOOL_USE = 5;        // tools multiples (MCP)
}

message CompleteRequest {
    string prompt = 1;
    IntentClass intent = 2;
    int32 max_tokens = 3;        // 0 -> defaut serveur
    string system_prompt = 4;    // optionnel, "" -> aucun
    string client_id = 5;        // tracing
}

message CompleteResponse {
    jarvis.common.v1.Status status = 1;
    string text = 2;
    string model = 3;            // nom du modele Ollama qui a repondu
    IntentClass intent = 4;      // intent loggé
    int32 input_tokens = 5;
    int32 output_tokens = 6;
    int32 estimated_prompt_tokens = 7;
}
