name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "services/**/*.py"
      - "services/**/pyproject.toml"
      - "pyproject.toml"
      - "proto/**"
      - "scripts/codegen_python.sh"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Annule les runs précédents sur la même branche
concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          protoc --version

      - name: Install Python tooling (workspace dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install grpcio grpcio-tools

      - name: Regenerate proto_gen (vérifie la codegen Python)
        run: bash scripts/codegen_python.sh

      - name: Install services (editable mode)
        run: |
          pip install -e services/jarvis-orchestrator
          # Les autres services seront installés au fil des sprints quand leurs deps seront vraiment utilisées.

      - name: ruff check
        run: ruff check

      - name: ruff format --check
        run: ruff format --check

      - name: pytest
        run: pytest -v
